{% extends "base.html" %}

{% block header_text %}
<h1>To-Do Lists</h1>
{% endblock %}

{% block content %}

<form method="POST" action="/lists/new">
    {% csrf_token %}

    <input
        id="id_new_item"
        name="item_text"
        class="form-control form-control-lg"
        placeholder="Enter a new list item"
    >

    <div class="mt-3">
        <button
            type="submit"
            class="btn btn-primary"
        >
            Create List
        </button>
    </div>

</form>

{% endblock %}
