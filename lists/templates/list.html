{% extends "base.html" %}

{% block header_text %}
<h1>To-Do List</h1>
{% endblock %}

{% block content %}

<table class="table table-striped">

    {% for item in items %}
    <tr>
        <td>
            {{ forloop.counter }}:
            {{ item.text }}
        </td>
    </tr>
    {% endfor %}

</table>

<form method="POST">
    {% csrf_token %}

    <input
        id="id_new_item"
        name="item_text"
        class="form-control form-control-lg"
        placeholder="Enter a new item"
    >

    <div class="mt-3">
        <button
            type="submit"
            class="btn btn-success"
        >
            Add
        </button>
    </div>

</form>

{% endblock %}
