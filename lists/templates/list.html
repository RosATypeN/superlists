{% extends "base.html" %}

{% block content %}
<h1>To-Do List</h1>
<table class="table">
    {% for item in items %}
    <tr><td>{{ forloop.counter }}: {{ item.text }}</td></tr>
    {% endfor %}
</table>

<form method="POST">
    {% csrf_token %}
    <input name="item_text" placeholder="Enter a new item">
    <button type="submit">Add</button>
</form>
{% endblock %}
